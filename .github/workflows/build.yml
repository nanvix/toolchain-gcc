name: "Build and Push"

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nanvix/toolchain-gcc

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Build Toolchain Image"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: "Log in to GHCR"
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Extract metadata"
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: "Build and push"
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: "Smoke Test"
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: "Log in to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Cross-compile hello.c"
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests:/tests" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            i686-nanvix-gcc -o /tmp/hello /tests/hello.c

      - name: "Verify ELF output"
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests:/tests" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            sh -c 'i686-nanvix-gcc -o /tmp/hello /tests/hello.c && file /tmp/hello | grep -q "ELF 32-bit"'
