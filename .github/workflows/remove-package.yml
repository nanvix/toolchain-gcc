name: Remove Legacy Package

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Remove all package tags and deletable versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          package="/orgs/${{ github.repository_owner }}/packages/container/toolchain-gcc"
          versions=$(gh api --paginate --slurp "$package/versions?per_page=100" \
            | jq '[.[][]]')
          jq -r '.[].metadata.container.tags[]?' <<< "$versions" \
            | sort -u > package-tags.txt

          if [ -s package-tags.txt ]; then
            mkdir removed-image
            printf '%s\n' \
              'FROM scratch' \
              'LABEL org.opencontainers.image.description="Removed legacy Nanvix toolchain"' \
              > removed-image/Dockerfile
            docker build -t retired-toolchain:local removed-image
            while IFS= read -r tag; do
              image="ghcr.io/${{ github.repository_owner }}/toolchain-gcc:$tag"
              docker tag retired-toolchain:local "$image"
              docker push "$image"
            done < package-tags.txt
          fi

          versions=$(gh api --paginate --slurp "$package/versions?per_page=100" \
            | jq '[.[][]]')
          delete_package=false
          while IFS= read -r version_id; do
            if output=$(gh api --method DELETE "$package/versions/$version_id" 2>&1); then
              continue
            fi
            if grep -Fq "more than 5000 downloads" <<< "$output"; then
              echo "::warning::GitHub retained untagged high-download version $version_id"
              continue
            fi
            if grep -Fq "last tagged version" <<< "$output"; then
              delete_package=true
              continue
            fi
            echo "$output" >&2
            exit 1
          done < <(jq -r '.[].id' <<< "$versions")

          if [ "$delete_package" = true ]; then
            if output=$(gh api --method DELETE "$package" 2>&1); then
              echo "Legacy package deleted."
              exit 0
            fi
            if grep -Fq "more than 5000 downloads" <<< "$output"; then
              echo "::warning::GitHub retained the package, but every public tag is inert"
              exit 0
            fi
            echo "$output" >&2
            exit 1
          fi

          remaining=$(gh api --paginate --slurp "$package/versions?per_page=100" \
            | jq '[.[][] | .metadata.container.tags[]?] | length')
          if [ "$remaining" -ne 0 ]; then
            echo "::error::$remaining legacy package tags remain"
            exit 1
          fi
